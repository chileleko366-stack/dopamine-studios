name: 6AM Morning Assembly

on:
  schedule:
    # 6AM SAST (UTC+2) = 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Channel to assemble (CH1-CH5 or ALL)"
        required: false
        default: "ALL"

jobs:
  assemble-and-upload:
    name: "Assemble videos + upload to YouTube"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Runs assembly for each channel that has renders ready
        channel: [CH1, CH2, CH3, CH4, CH5]
      fail-fast: false  # If one channel fails, others continue
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install \
            anthropic \
            requests \
            cloudinary \
            python-dotenv \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            ffmpeg-python \
            Pillow \
            edge-tts

      - name: Check if channel has renders ready
        id: check
        env:
          CHANNEL_ID: ${{ matrix.channel }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/check_renders.py
        continue-on-error: true

      - name: Download renders from Cloudinary
        if: steps.check.outputs.has_renders == 'true'
        env:
          CHANNEL_ID: ${{ matrix.channel }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/download_renders.py

      - name: Generate voiceover (documentary channels only)
        if: steps.check.outputs.has_renders == 'true' && (matrix.channel == 'CH3' || matrix.channel == 'CH5')
        env:
          CHANNEL_ID: ${{ matrix.channel }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/generate_voiceover.py

      - name: Assemble final video with ffmpeg
        if: steps.check.outputs.has_renders == 'true'
        env:
          CHANNEL_ID: ${{ matrix.channel }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/assemble_video.py

      - name: Generate thumbnail
        if: steps.check.outputs.has_renders == 'true'
        env:
          CHANNEL_ID: ${{ matrix.channel }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/generate_thumbnail.py

      - name: Upload to YouTube
        if: steps.check.outputs.has_renders == 'true'
        env:
          CHANNEL_ID: ${{ matrix.channel }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/upload_youtube.py

      - name: Cleanup Cloudinary temp assets
        if: steps.check.outputs.has_renders == 'true'
        env:
          CHANNEL_ID: ${{ matrix.channel }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/cleanup_cloudinary.py

  notify-complete:
    name: "Send morning summary"
    runs-on: ubuntu-latest
    needs: assemble-and-upload
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Send Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PIPELINE_STATUS: ${{ needs.assemble-and-upload.result }}
        run: python scripts/telegram_notify.py --mode morning_summary
