name: 11PM Render Trigger

on:
  schedule:
    # 11PM SAST (UTC+2) = 21:00 UTC
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  write-render-jobs:
    name: "Write render jobs → Cloudinary queue"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests cloudinary python-dotenv
