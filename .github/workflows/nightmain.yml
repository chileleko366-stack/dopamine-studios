name: Nightly Video Pipeline

on:
  schedule:
    # 10PM SAST (UTC+2) = 20:00 UTC — topic preview + Telegram notification
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Channel to run (CH1/CH2/CH3/CH4/CH5 or ALL)"
        required: false
        default: "ALL"
      override_topic:
        description: "Override topic (leave blank for auto)"
        required: false
        default: ""

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Topic Preview (runs at 10PM)
  # Sends tonight's auto-generated topics to Telegram
  # You have until 11PM to override via Telegram reply
  # ─────────────────────────────────────────────
  topic-preview:
    name: "10PM — Generate topics & notify"
    runs-on: ubuntu-latest
    outputs:
      topics_json: ${{ steps.gen.outputs.topics_json }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv cloudinary

      - name: Generate tonight's topics
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CHANNEL_OVERRIDE: ${{ github.event.inputs.channel_id || 'ALL' }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.override_topic || '' }}
        run: python scripts/generate_topics.py

      - name: Install dependencies
        run: pip install anthropic requests cloudinary python-dotenv

      - name: Write render jobs to Cloudinary queue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TOPICS_JSON: ${{ needs.topic-preview.outputs.topics_json }}
        run: python scripts/write_render_jobs.py

      - name: Install dependencies
        run: |
          pip install anthropic requests cloudinary python-dotenv google-api-python-client google-auth-httplib2 google-auth-oauthlib ffmpeg-python Pillow

      - name: Check render completion
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/check_renders.py

      - name: Assemble videos
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/assemble_video.py

      - name: Generate thumbnails
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_thumbnail.py

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH1 }}
          YOUTUBE_REFRESH_TOKEN_CH2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH2 }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/upload_youtube.py

      - name: Cleanup Cloudinary temp files
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: python scripts/cleanup_cloudinary.py

---
# SEPARATE WORKFLOW for the 11PM render trigger
# (GitHub cron can't delay within one workflow)
